<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポモドーロタイマー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      transition: background 0.6s;
    }

    body.break-mode { background: #0f3460; }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 2rem;
    }

    .ring-wrap {
      position: relative;
      width: 260px;
      height: 260px;
      margin-bottom: 2rem;
    }

    svg.ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg { fill: none; stroke: #ffffff15; stroke-width: 10; }
    .ring-progress {
      fill: none;
      stroke: #e94560;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.6s;
    }
    body.break-mode .ring-progress { stroke: #0f9; }

    .time-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .time {
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    .phase-label {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      opacity: 0.5;
      margin-top: 0.25rem;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    button {
      border: none;
      border-radius: 50px;
      padding: 0.65rem 1.8rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.96); }

    #btn-toggle {
      background: #e94560;
      color: #fff;
      font-weight: 600;
      min-width: 100px;
    }
    body.break-mode #btn-toggle { background: #0f9; color: #000; }

    #btn-reset {
      background: #ffffff15;
      color: #eee;
    }
    #btn-reset:hover { background: #ffffff25; }

    .session-count {
      font-size: 0.85rem;
      opacity: 0.45;
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
    }

    .tomatoes {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }
    .tomato { font-size: 1.4rem; opacity: 0.25; transition: opacity 0.4s; }
    .tomato.done { opacity: 1; }

    .settings {
      display: flex;
      gap: 2.5rem;
      opacity: 0.6;
      font-size: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }
    .setting-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }
    .setting-label {
      letter-spacing: 0.12em;
      opacity: 0.7;
    }

    /* time adjuster: [min-btns] [mm:ss display] [sec-btns] */
    .time-adjuster {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .mmss-display {
      font-size: 2rem;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.8rem;
      background: #ffffff10;
      border: 1px solid #ffffff20;
      border-radius: 8px;
      min-width: 5.2rem;
      text-align: center;
    }
    /* 2×2 grid of up/down buttons for each unit */
    .unit-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.25rem;
    }
    .unit-btns button {
      background: #ffffff12;
      color: #eee;
      border-radius: 6px;
      padding: 0.3rem 0;
      font-size: 0.68rem;
      min-width: unset;
      width: 2.8rem;
      line-height: 1.2;
    }
    .unit-btns button:hover { background: #ffffff22; }

    /* set count */
    .set-count-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .set-count-wrap input[type=number] {
      width: 48px;
      text-align: center;
      background: #ffffff10;
      border: 1px solid #ffffff20;
      border-radius: 6px;
      color: #eee;
      padding: 0.35rem 0.4rem;
      font-size: 1rem;
    }
    .set-count-wrap input[type=number]:focus { outline: none; border-color: #e94560; }
    .set-count-wrap button {
      background: #ffffff12;
      color: #eee;
      border-radius: 6px;
      padding: 0.3rem 0.55rem;
      font-size: 1rem;
      min-width: unset;
    }
    .set-count-wrap button:hover { background: #ffffff22; }
  </style>
</head>
<body>
  <h1>Pomodoro</h1>

  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 100 100">
      <circle class="ring-bg" cx="50" cy="50" r="44"/>
      <circle class="ring-progress" id="ring" cx="50" cy="50" r="44"/>
    </svg>
    <div class="time-display">
      <div class="time" id="time-display">25:00</div>
      <div class="phase-label" id="phase-label">作業中</div>
    </div>
  </div>

  <div class="controls">
    <button id="btn-reset">リセット</button>
    <button id="btn-toggle">開始</button>
  </div>

  <div class="tomatoes" id="tomatoes"></div>

  <div class="session-count" id="session-count">セッション 0 / 4</div>

  <div class="settings">
    <div class="setting-group">
      <span class="setting-label">作業時間</span>
      <div class="time-adjuster">
        <!-- 分ボタン: 10分列・1分列 -->
        <div class="unit-btns">
          <button data-target="work" data-delta="600">▲<br>10分</button>
          <button data-target="work" data-delta="60">▲<br>1分</button>
          <button data-target="work" data-delta="-600">▼<br>10分</button>
          <button data-target="work" data-delta="-60">▼<br>1分</button>
        </div>
        <div class="mmss-display" id="work-display">25:00</div>
        <!-- 秒ボタン: 10秒列・1秒列 -->
        <div class="unit-btns">
          <button data-target="work" data-delta="10">▲<br>10秒</button>
          <button data-target="work" data-delta="1">▲<br>1秒</button>
          <button data-target="work" data-delta="-10">▼<br>10秒</button>
          <button data-target="work" data-delta="-1">▼<br>1秒</button>
        </div>
      </div>
    </div>

    <div class="setting-group">
      <span class="setting-label">休憩時間</span>
      <div class="time-adjuster">
        <div class="unit-btns">
          <button data-target="break" data-delta="600">▲<br>10分</button>
          <button data-target="break" data-delta="60">▲<br>1分</button>
          <button data-target="break" data-delta="-600">▼<br>10分</button>
          <button data-target="break" data-delta="-60">▼<br>1分</button>
        </div>
        <div class="mmss-display" id="break-display">05:00</div>
        <div class="unit-btns">
          <button data-target="break" data-delta="10">▲<br>10秒</button>
          <button data-target="break" data-delta="1">▲<br>1秒</button>
          <button data-target="break" data-delta="-10">▼<br>10秒</button>
          <button data-target="break" data-delta="-1">▼<br>1秒</button>
        </div>
      </div>
      <span class="setting-label" style="margin-top:0.8rem">セット数</span>
      <div class="set-count-wrap">
        <button id="set-down">▼</button>
        <input type="number" id="set-count" value="4" min="1" max="10">
        <button id="set-up">▲</button>
      </div>
    </div>
  </div>

  <script>
    const CIRCUMFERENCE = 2 * Math.PI * 44;
    const ring = document.getElementById('ring');
    ring.style.strokeDasharray = CIRCUMFERENCE;

    let totalSecs, remaining, timer = null, isRunning = false, isBreak = false, sessions = 0;
    let workSecs = 25 * 60, breakSecs = 5 * 60;

    const timeDisplay    = document.getElementById('time-display');
    const phaseLabel     = document.getElementById('phase-label');
    const sessionCount   = document.getElementById('session-count');
    const tomatoContainer = document.getElementById('tomatoes');
    const btnToggle      = document.getElementById('btn-toggle');
    const btnReset       = document.getElementById('btn-reset');
    const workDisplay    = document.getElementById('work-display');
    const breakDisplay   = document.getElementById('break-display');
    const setInput       = document.getElementById('set-count');

    function fmtMmss(s) {
      return `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
    }

    function getSetCount() { return Math.max(1, parseInt(setInput.value) || 4); }
    function getTomatoEls() { return tomatoContainer.querySelectorAll('.tomato'); }

    function rebuildTomatoes() {
      const n = getSetCount();
      tomatoContainer.innerHTML = Array.from({length: n}, () => '<span class="tomato">🍅</span>').join('');
    }

    function init(breakPhase = false) {
      isBreak = breakPhase;
      totalSecs = isBreak ? breakSecs : workSecs;
      remaining = totalSecs;
      render();
      document.body.classList.toggle('break-mode', isBreak);
      phaseLabel.textContent = isBreak ? '休憩中' : '作業中';
    }

    function render() {
      timeDisplay.textContent = fmtMmss(remaining);
      const frac = totalSecs > 0 ? remaining / totalSecs : 1;
      ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - frac);
    }

    function tick() {
      if (remaining <= 0) { onPhaseEnd(); return; }
      remaining--;
      render();
    }

    function onPhaseEnd() {
      clearInterval(timer); timer = null; isRunning = false;
      btnToggle.textContent = '開始';
      if (!isBreak) {
        const n = getSetCount();
        sessions++;
        sessionCount.textContent = `セッション ${sessions} / ${n}`;
        getTomatoEls().forEach((el, i) => el.classList.toggle('done', i < sessions % n || (sessions % n === 0 && sessions > 0)));
        notify('作業終了！休憩しましょう 🍅', false);
        init(true);
      } else {
        notify('休憩終了！次のセッションを始めましょう', true);
        init(false);
      }
    }

    function notify(msg, wasBreak) {
      if (Notification.permission === 'granted') {
        new Notification('ポモドーロ', { body: msg, icon: '🍅' });
      }
      const beep = new AudioContext();
      [0, 150, 300].forEach(delay => {
        const o = beep.createOscillator();
        const g = beep.createGain();
        o.connect(g); g.connect(beep.destination);
        o.frequency.value = wasBreak ? 523 : 880;
        g.gain.setValueAtTime(0.3, beep.currentTime + delay / 1000);
        g.gain.exponentialRampToValueAtTime(0.001, beep.currentTime + delay / 1000 + 0.3);
        o.start(beep.currentTime + delay / 1000);
        o.stop(beep.currentTime + delay / 1000 + 0.3);
      });
    }

    btnToggle.addEventListener('click', () => {
      if (!isRunning) {
        if (Notification.permission === 'default') Notification.requestPermission();
        timer = setInterval(tick, 1000);
        isRunning = true;
        btnToggle.textContent = '一時停止';
      } else {
        clearInterval(timer); timer = null;
        isRunning = false;
        btnToggle.textContent = '再開';
      }
    });

    btnReset.addEventListener('click', () => {
      clearInterval(timer); timer = null; isRunning = false;
      btnToggle.textContent = '開始';
      sessions = 0;
      sessionCount.textContent = `セッション 0 / ${getSetCount()}`;
      getTomatoEls().forEach(el => el.classList.remove('done'));
      init(false);
    });

    document.querySelectorAll('.adj-btns button').forEach(btn => {
      btn.addEventListener('click', () => {
        if (isRunning) return;
        const target = btn.dataset.target;
        const delta  = parseInt(btn.dataset.delta);
        if (target === 'work') {
          workSecs = Math.max(1, workSecs + delta);
          workDisplay.textContent = fmtMmss(workSecs);
        } else {
          breakSecs = Math.max(1, breakSecs + delta);
          breakDisplay.textContent = fmtMmss(breakSecs);
        }
        if (!isBreak && target === 'work')   init(false);
        if (isBreak  && target === 'break')  init(true);
      });
    });

    setInput.addEventListener('change', () => {
      if (!isRunning) {
        sessions = 0;
        rebuildTomatoes();
        sessionCount.textContent = `セッション 0 / ${getSetCount()}`;
      }
    });

    function updateSetCount(delta) {
      if (isRunning) return;
      setInput.value = Math.min(10, Math.max(1, getSetCount() + delta));
      sessions = 0;
      rebuildTomatoes();
      sessionCount.textContent = `セッション 0 / ${getSetCount()}`;
    }
    document.getElementById('set-up').addEventListener('click', () => updateSetCount(1));
    document.getElementById('set-down').addEventListener('click', () => updateSetCount(-1));

    rebuildTomatoes();
    init();
  </script>
</body>
</html>
